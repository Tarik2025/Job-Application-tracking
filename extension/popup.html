<!DOCTYPE html>
<html>
<head>
  <style>
    body { width: 320px; padding: 16px; font-family: system-ui; background: #0f172a; color: #f1f5f9; }
    h1 { font-size: 16px; margin: 0 0 12px; }
    .field { margin-bottom: 8px; }
    label { font-size: 11px; color: #94a3b8; display: block; margin-bottom: 2px; }
    input, textarea { width: 100%; padding: 6px 8px; background: #1e293b; border: 1px solid #334155; border-radius: 6px; color: #f1f5f9; font-size: 12px; box-sizing: border-box; }
    textarea { height: 60px; resize: vertical; }
    button { width: 100%; padding: 8px; background: #3b82f6; color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: 600; margin-top: 8px; }
    button:hover { background: #2563eb; }
    .status { font-size: 11px; margin-top: 8px; text-align: center; }
    .success { color: #10b981; }
    .error { color: #ef4444; }
    .settings { margin-bottom: 12px; }
  </style>
</head>
<body>
  <h1>🚀 Career Copilot</h1>

  <div class="settings">
    <div class="field">
      <label>API URL</label>
      <input id="apiUrl" placeholder="http://localhost:3001" />
    </div>
    <div class="field">
      <label>Auth Token (from browser cookies)</label>
      <input id="token" type="password" placeholder="Paste your JWT token" />
    </div>
  </div>

  <div class="field"><label>Company</label><input id="company" /></div>
  <div class="field"><label>Role</label><input id="role" /></div>
  <div class="field"><label>Location</label><input id="location" /></div>
  <div class="field"><label>Job Description</label><textarea id="jd"></textarea></div>

  <button id="extract">🔍 Extract from Page</button>
  <button id="save" style="background:#10b981">💾 Save to Career Copilot</button>
  <div id="status" class="status"></div>

  <script src="popup.js"></script>
</body>
</html>
